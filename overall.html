<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outcome.xyz - World Cup 2026 Campaign Dashboard - Overall</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: "PP Neue Corp";
  src: url("fonts/PPNeueCorp-Medium.otf") format("opentype");
  font-weight: 500;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: "PP Neue Corp";
  src: url("fonts/PPNeueCorp-ExtraBoldCondensed.otf") format("opentype");
  font-weight: 800;
  font-style: normal;
  font-stretch: condensed;
  font-display: swap;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  background: #0A0A0B;
  color: #F5F8FF;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
}

/* ---------- NAV ---------- */
.nav {
  position: sticky; top: 0; z-index: 20;
  height: 64px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  background: rgba(10,10,11,0.74);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
.nav-left { display: flex; align-items: center; gap: 10px; }
.nav-logo { height: 20px; width: auto; flex-shrink: 0; }
.nav-divider { color: rgba(255,255,255,0.25); font-weight: 300; font-size: 17px; }
.nav-subtitle {
  font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
  color: rgba(255,255,255,0.5);
}
.nav-right { display: flex; align-items: center; gap: 12px; }
.live-badge {
  height: 30px; padding: 0 14px; border-radius: 8px;
  border: 1px solid rgba(255,92,92,0.4);
  display: flex; align-items: center; gap: 8px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
  color: rgb(255,92,92); text-transform: uppercase;
}
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: radial-gradient(circle, rgb(255,92,92) 0%, rgba(255,92,92,0.4) 100%);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}
.date-badge {
  height: 38px; padding: 0 16px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.12);
  display: flex; align-items: center;
  font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.7); text-transform: uppercase;
}

/* ---------- CONTENT ---------- */
.content {
  max-width: 1480px; margin: 0 auto;
  padding: 44px 40px 64px;
}

/* ---------- WEEK NAV ---------- */
.week-nav {
  display: flex; gap: 8px; padding: 12px 0; margin-bottom: 20px;
}
.week-nav a {
  font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 8px 16px; border-radius: 8px;
  cursor: pointer; text-decoration: none;
  color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.08);
  transition: all 0.15s ease;
}
.week-nav a:hover { color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.12); }
.week-nav a.active {
  color: #F5F8FF; background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
}

/* ---------- TITLE ---------- */
.title-area {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 32px; flex-wrap: wrap; margin-bottom: 34px;
}
.title-left {}
.title-sub {
  font-size: 12px; font-weight: 500; letter-spacing: 0.16em;
  color: #45E85C; margin-bottom: 16px; text-transform: uppercase;
}
.title-h1 {
  font-family: 'PP Neue Corp', 'Inter', system-ui, sans-serif; font-weight: 800;
  font-stretch: condensed; text-transform: uppercase;
  letter-spacing: -0.01em; font-size: 64px; line-height: 0.88;
  color: #F5F8FF;
}
.title-h1 .green { color: #45E85C; }
.title-badges { display: flex; gap: 10px; align-items: center; }
.badge {
  height: 38px; padding: 0 16px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.12);
  display: flex; align-items: center;
  font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.7); text-transform: uppercase;
}
.badge.orange { color: #F58220; border-color: rgba(245,130,32,0.3); }

/* ---------- KPI CARDS ---------- */
.kpi-grid {
  display: grid; grid-template-columns: repeat(6, 1fr);
  gap: 14px; margin-bottom: 14px;
}
.kpi-card {
  position: relative; padding: 20px; border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.07);
  background: rgba(255,255,255,0.02); overflow: hidden;
}
.kpi-bar {
  position: absolute; top: 0; left: 0; width: 100%; height: 3px;
}
.kpi-label {
  font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 16px;
}
.kpi-value {
  font-family: 'PP Neue Corp', 'Inter', system-ui, sans-serif;
  font-size: 32px; font-weight: 500; letter-spacing: -0.04em;
  line-height: 1; color: #F5F8FF;
}
.kpi-sub {
  font-size: 10px; font-weight: 500; letter-spacing: 0.04em;
  color: rgba(255,255,255,0.45); margin-top: 9px; text-transform: uppercase;
}

/* ---------- CARD ---------- */
.card {
  padding: 28px; border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.07);
  background: rgba(255,255,255,0.02); margin-bottom: 14px;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.card-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase;
}
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.card-meta {
  font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.35); text-transform: uppercase;
}

/* ---------- VOLUME EVOLUTION ---------- */
.evolution-chart {
  position: relative;
  display: flex; align-items: flex-end; gap: 6px; height: 280px;
  padding-top: 60px;
}
.evo-bar-wrap {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  height: 100%; justify-content: flex-end; position: relative;
}
.evo-bar-val {
  font-size: 9px; font-weight: 500; color: rgba(255,255,255,0.55);
  margin-bottom: 4px; white-space: nowrap;
}
.evo-bar {
  width: 100%; border-radius: 4px 4px 0 0;
  background: #45E85C; transition: height 0.3s ease;
}
.evo-bar-date {
  font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.6);
  margin-top: 8px;
}
.evo-bar-day {
  font-size: 9px; font-weight: 500; color: rgba(255,255,255,0.3);
  text-transform: uppercase;
}
.evo-milestones {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; pointer-events: none;
}
.milestone-pill {
  font-size: 8px; font-weight: 600; padding: 2px 6px;
  border-radius: 4px; white-space: nowrap; line-height: 1.3;
  position: absolute;
}
.milestone-pill.green-pill { background: rgba(69,232,92,0.2); color: #45E85C; }
.milestone-pill.blue-pill { background: rgba(59,130,246,0.2); color: #3B82F6; }
.milestone-pill.orange-pill { background: rgba(245,130,32,0.2); color: #F58220; }

.week-divider {
  position: absolute; top: 0; bottom: 0; width: 1px;
  background: rgba(255,255,255,0.12);
}
.week-divider-label {
  position: absolute; top: -4px;
  font-size: 8px; font-weight: 600; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.3); text-transform: uppercase;
}

/* ---------- BLENDED COST METRICS ---------- */
.cost-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
  margin-bottom: 14px;
}
.cost-card {
  padding: 28px; border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.07);
  background: rgba(255,255,255,0.02);
  text-align: center;
}
.cost-label {
  font-size: 10px; font-weight: 500; letter-spacing: 0.12em;
  text-transform: uppercase; color: rgba(255,255,255,0.45);
  margin-bottom: 16px;
}
.cost-value {
  font-family: 'PP Neue Corp', 'Inter', system-ui, sans-serif;
  font-size: 44px; font-weight: 500; letter-spacing: -0.04em;
  line-height: 1; color: #F58220;
}
.cost-sub {
  font-size: 10px; font-weight: 500; letter-spacing: 0.04em;
  color: rgba(255,255,255,0.35); margin-top: 12px; text-transform: uppercase;
}

/* ---------- VOLUME SECTION ---------- */
.volume-grid {
  display: grid; grid-template-columns: 1fr 1fr 1.3fr; gap: 32px;
}
.volume-col-label {
  font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 16px;
}
.volume-big {
  font-family: 'PP Neue Corp', 'Inter', system-ui, sans-serif;
  font-size: 52px; font-weight: 600; line-height: 1; margin-bottom: 4px;
}
.volume-of {
  font-size: 12px; font-weight: 500; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 20px;
}
.volume-bar-track {
  width: 100%; height: 6px; border-radius: 3px;
  background: rgba(255,255,255,0.08); margin-bottom: 12px; overflow: hidden;
}
.volume-bar-fill { height: 100%; border-radius: 3px; }
.volume-legend {
  font-size: 10px; font-weight: 500; letter-spacing: 0.04em;
  color: rgba(255,255,255,0.45); text-transform: uppercase;
}

/* Stacked volume chart */
.stacked-chart { display: flex; align-items: flex-end; gap: 6px; height: 220px; }
.stacked-bar-wrap {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0; height: 100%;
  justify-content: flex-end; position: relative;
}
.stacked-bar {
  width: 100%; min-height: 2px;
}
.stacked-bar:first-child { border-radius: 3px 3px 0 0; }
.stacked-bar.outcome { background: #45E85C; }
.stacked-bar.hl { background: rgba(255,255,255,0.12); border-radius: 3px 3px 0 0; }
.stacked-bar-date {
  font-size: 9px; font-weight: 500; color: rgba(255,255,255,0.4);
  text-transform: uppercase; margin-top: 6px;
}
.week-divider {
  position: absolute; left: -3px; top: 0; bottom: 20px;
  border-left: 1px dashed rgba(255,255,255,0.15);
}
.week-divider-label {
  position: absolute; top: -10px; left: 4px;
  font-size: 8px; font-weight: 600; letter-spacing: 0.08em;
  color: rgba(255,255,255,0.3); text-transform: uppercase; white-space: nowrap;
}

/* ---------- IMPRESSIONS SECTION ---------- */
.imp-chart { margin-top: 8px; }
.imp-row {
  display: flex; align-items: center; gap: 0; margin-bottom: 10px;
}
.imp-channel {
  width: 200px; flex-shrink: 0;
  font-size: 11px; font-weight: 500; letter-spacing: 0.04em;
  color: rgba(255,255,255,0.7); text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.imp-channel .dot { width: 8px; height: 8px; }
.imp-bar-track {
  flex: 1; height: 28px; border-radius: 4px;
  background: rgba(255,255,255,0.03); overflow: hidden; position: relative;
}
.imp-bar-fill { height: 100%; border-radius: 4px; min-width: 2px; }
.imp-value {
  width: 90px; text-align: right; flex-shrink: 0;
  font-size: 12px; font-weight: 500; letter-spacing: 0.02em;
  color: rgba(255,255,255,0.6); padding-left: 12px;
}
.imp-axis {
  display: flex; justify-content: space-between;
  margin-top: 8px; padding-left: 200px; padding-right: 90px;
}
.imp-axis span {
  font-size: 9px; font-weight: 500; color: rgba(255,255,255,0.25);
  text-transform: uppercase;
}
.imp-callouts {
  display: flex; gap: 32px; margin-top: 20px; padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.imp-callout {
  font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.45);
  letter-spacing: 0.04em;
}
.imp-callout strong { color: #F5F8FF; font-weight: 600; }

/* ---------- TG SPONSORSHIP FUNNEL ---------- */
.funnel-row {
  display: flex; align-items: center; gap: 0; margin-bottom: 10px;
}
.funnel-channel {
  width: 120px; flex-shrink: 0;
  font-size: 11px; font-weight: 500; letter-spacing: 0.04em;
  color: rgba(255,255,255,0.7); text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.funnel-channel .dot { width: 8px; height: 8px; }
.funnel-bar-track {
  flex: 1; height: 28px; border-radius: 4px;
  background: rgba(255,255,255,0.03); overflow: hidden; position: relative;
}
.funnel-bar-fill { height: 100%; border-radius: 4px; min-width: 2px; }
.funnel-value {
  width: 90px; text-align: right; flex-shrink: 0;
  font-size: 12px; font-weight: 500; letter-spacing: 0.02em;
  color: rgba(255,255,255,0.6); padding-left: 12px;
}
.funnel-rate {
  width: 70px; text-align: right; flex-shrink: 0;
  font-size: 10px; font-weight: 500; letter-spacing: 0.04em;
  color: rgba(255,255,255,0.35); padding-left: 8px;
}
.funnel-est-tag {
  font-size: 7px; font-weight: 600; letter-spacing: 0.06em;
  color: rgba(255,255,255,0.25); text-transform: uppercase;
  padding: 1px 4px; border: 1px dashed rgba(255,255,255,0.12);
  border-radius: 2px; margin-left: 4px;
}
.funnel-callouts {
  display: flex; gap: 32px; margin-top: 20px; padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.funnel-callout {
  font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.45);
  letter-spacing: 0.04em;
}
.funnel-callout strong { color: #F5F8FF; font-weight: 600; }

/* ---------- COHORT RETENTION WATERFALL ---------- */
.waterfall-grid {
  display: grid; grid-template-columns: 90px 1fr 180px; gap: 0;
  align-items: stretch;
}
.waterfall-row {
  display: contents;
}
.waterfall-label {
  padding: 6px 12px 6px 0; display: flex; flex-direction: column;
  justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.waterfall-label-date { font-size: 11px; font-weight: 600; color: #F5F8FF; }
.waterfall-label-day { font-size: 9px; color: rgba(255,255,255,0.35); text-transform: uppercase; }
.waterfall-bars {
  display: flex; align-items: center; gap: 3px;
  padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.waterfall-seg {
  height: 24px; border-radius: 3px; position: relative;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; font-weight: 600; color: rgba(0,0,0,0.7);
  min-width: 2px; transition: width 0.3s ease;
}
.waterfall-seg.signups { background: #45E85C; }
.waterfall-seg.traders { background: #3B82F6; }
.waterfall-seg.depositors { background: #FF5C9E; }
.waterfall-seg.dormant { background: rgba(255,255,255,0.06); }
.waterfall-legend {
  display: flex; gap: 20px; margin-top: 16px;
}
.waterfall-legend-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.5);
}
.waterfall-legend-dot {
  width: 8px; height: 8px; border-radius: 2px;
}
.waterfall-header {
  display: contents;
}
.waterfall-header-label {
  padding: 0 0 10px 0;
  font-size: 9px; font-weight: 500; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.4); text-transform: uppercase;
}
.cohort-table { width: 100%; border-collapse: collapse; }
.cohort-table th {
  font-size: 9px; font-weight: 500; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.4); text-transform: uppercase;
  text-align: right; padding: 0 0 14px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.cohort-table th:first-child { text-align: left; }
.cohort-table td {
  padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.6);
  text-align: right;
}
.cohort-table td:first-child { text-align: left; }
.cohort-date-main { color: #F5F8FF; font-weight: 600; }
.cohort-date-day {
  font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.3);
  text-transform: uppercase; margin-left: 6px;
}
.cohort-table td.green { color: #45E85C; }
.cohort-table td.highlight { color: #45E85C; font-weight: 600; }
.cohort-table tr.week-sep td {
  border-bottom: 2px solid rgba(69,232,92,0.15);
}
.cohort-table tr.summary-row td {
  border-bottom: none; font-weight: 600; color: #F5F8FF;
  border-top: 1px solid rgba(255,255,255,0.08); padding-top: 16px;
}
.cohort-table tr.summary-row td:first-child { color: #45E85C; }
.cohort-bar {
  display: inline-block; height: 6px; border-radius: 3px;
  background: #45E85C; margin-right: 8px; vertical-align: middle;
}

/* ---------- DAILY + CONVERSIONS SIDE BY SIDE ---------- */
.side-grid {
  display: grid; grid-template-columns: 1fr 0.82fr;
  gap: 14px; margin-bottom: 14px;
}

/* Daily totals chart */
.metric-switcher { display: flex; gap: 6px; }
.metric-btn {
  padding: 6px 14px; border-radius: 8px;
  font-size: 10px; font-weight: 500; letter-spacing: 0.08em;
  text-transform: uppercase; cursor: pointer; border: none; outline: none;
  transition: all 0.15s ease;
  background: transparent; border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.5);
}
.metric-btn.active {
  background: rgba(69,232,92,0.12); border: 1px solid rgba(69,232,92,0.3);
  color: #45E85C;
}
.metric-btn:hover:not(.active) {
  border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.7);
}
.daily-subtitle {
  font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.35); text-transform: uppercase; margin-bottom: 20px;
}
.daily-chart { display: flex; align-items: flex-end; gap: 6px; height: 200px; padding-top: 20px; }
.daily-bar-wrap {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  height: 100%; justify-content: flex-end;
}
.daily-bar-val {
  font-size: 9px; font-weight: 500; color: rgba(255,255,255,0.5);
  margin-bottom: 4px;
}
.daily-bar {
  width: 100%; border-radius: 4px 4px 0 0;
  transition: height 0.3s ease;
}
.daily-bar.w1 { background: #45E85C; }
.daily-bar.w2 { background: #3B82F6; }
.daily-bar-date {
  font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.6);
  margin-top: 6px;
}
.daily-bar-day {
  font-size: 8px; font-weight: 500; color: rgba(255,255,255,0.3);
  text-transform: uppercase;
}

/* ---------- CONVERSIONS TABLE ---------- */
.conv-table { width: 100%; border-collapse: collapse; }
.conv-table th {
  font-size: 9px; font-weight: 500; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.4); text-transform: uppercase;
  text-align: right; padding: 0 0 12px 0;
}
.conv-table th:first-child { text-align: left; }
.conv-table td {
  padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.7);
  text-align: right;
}
.conv-table td:first-child {
  text-align: left; display: flex; align-items: center; gap: 8px;
}
.conv-table td:first-child .dot { width: 8px; height: 8px; }
.conv-table tr.total td {
  border-bottom: none; font-weight: 600; color: #F5F8FF;
  padding-top: 14px;
}
.conv-table tr.total td:first-child { color: #45E85C; }
.conv-footnote {
  font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.25);
  margin-top: 16px; letter-spacing: 0.04em;
}

/* ---------- ATTRIBUTION / INSIGHT BLOCKS ---------- */
.insight-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
  margin-bottom: 14px;
}
.insight-block {
  padding: 20px; border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.07);
  background: rgba(255,255,255,0.02);
}
.insight-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px; font-size: 16px;
}
.insight-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 8px;
}
.insight-text {
  font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.55);
  line-height: 1.5;
}
.insight-text strong { color: #F5F8FF; font-weight: 600; }

/* ---------- RETENTION STAT CARDS ---------- */
.stat-grid {

<script>
// ===================== SPEND BADGE =====================
document.getElementById('totalSpendBadge').textContent = '$' + formatNumber(DATA.totalSpend) + ' Spend';

// ===================== KPI CARDS =====================
(function() {

    { label: 'Signups', value: d.signups, color: '#45E85C', sub: 'campaign total' },
    { label: 'Depositors', value: d.depositors, color: '#FF5C9E', sub: depPct + '% of signups' },

// ===================== BLENDED COST METRICS =====================
(function() {
  const spend = DATA.totalSpend;

  const cpm = (spend / d.impressions * 1000).toFixed(2);
  const cpc = (spend / d.clicks).toFixed(2);
  const cpa = (spend / d.signups).toFixed(2);
  const costPerTrader = (spend / d.activeTraders).toFixed(2);

  const costs = [
    { label: 'CPM', value: '$' + cpm, sub: 'cost per 1,000 impressions' },

})();

// ===================== VOLUME EVOLUTION =====================
(function() {
  const days = DATA.daily;
  const maxVol = Math.max(...days.map(d => d.outcomeVol));

  let barsHtml = '';
  days.forEach((d, i) => {
    const h = Math.max(Math.round((d.outcomeVol / maxVol) * 200), 4);
    const dateNum = d.date.split(' ')[1];
    barsHtml += `
      <div class="evo-bar-wrap" id="evo-bar-${i}">
        <div class="evo-bar-val">${formatCurrency(d.outcomeVol)}</div>
        <div class="evo-bar" style="height:${h}px"></div>
        <div class="evo-bar-date">${dateNum}</div>
        <div class="evo-bar-day">${d.day}</div>
      </div>`;
  });

  document.getElementById('evolutionCard').innerHTML = `
    <div class="card-header">
      <div class="card-title"><div class="dot" style="background:#45E85C"></div> VOLUME EVOLUTION</div>
      <div class="card-meta">DAILY OUTCOME VOLUME &middot; JUN 10 &ndash; 23</div>
    </div>
    <div style="position:relative">
      <div class="evolution-chart" id="evoChart">${barsHtml}</div>
    </div>`;

  // Add milestone pills and week divider after render
  requestAnimationFrame(function() {
    const chart = document.getElementById('evoChart');
    const barWraps = chart.querySelectorAll('.evo-bar-wrap');
    if (!barWraps.length) return;

    // Week divider between bar 6 (Jun 16) and bar 7 (Jun 17)
    const bar6 = barWraps[6];
    const bar7 = barWraps[7];
    const chartRect = chart.getBoundingClientRect();
    const bar6Rect = bar6.getBoundingClientRect();
    const bar7Rect = bar7.getBoundingClientRect();
    const dividerX = ((bar6Rect.right + bar7Rect.left) / 2) - chartRect.left;

    const divider = document.createElement('div');
    divider.className = 'week-divider';
    divider.style.cssText = 'position:absolute;top:0;bottom:30px;left:' + dividerX + 'px;width:1px;background:rgba(255,255,255,0.12);z-index:2;';
    chart.style.position = 'relative';
    chart.appendChild(divider);

    const w1Label = document.createElement('div');
    w1Label.className = 'week-divider-label';
    w1Label.textContent = 'W1';
    w1Label.style.cssText = 'position:absolute;top:0;font-size:8px;font-weight:600;letter-spacing:0.1em;color:rgba(255,255,255,0.3);text-transform:uppercase;';
    w1Label.style.left = (dividerX - 20) + 'px';
    chart.appendChild(w1Label);

    const w2Label = document.createElement('div');
    w2Label.className = 'week-divider-label';
    w2Label.textContent = 'W2';
    w2Label.style.cssText = 'position:absolute;top:0;font-size:8px;font-weight:600;letter-spacing:0.1em;color:rgba(255,255,255,0.3);text-transform:uppercase;';
    w2Label.style.left = (dividerX + 8) + 'px';
    chart.appendChild(w2Label);

    // Milestone pills
    const milestones = DATA.milestones;
    milestones.forEach(m => {
      const bar = barWraps[m.dayIndex];
      if (!bar) return;
      const barRect = bar.getBoundingClientRect();
      const pill = document.createElement('div');
      pill.className = 'milestone-pill ' + m.type + '-pill';
      pill.textContent = m.label;
      const pillLeft = barRect.left - chartRect.left + (barRect.width / 2);
      const verticalOffset = m.offset ? 18 : 0;
      pill.style.cssText = 'position:absolute;top:' + (20 + verticalOffset) + 'px;left:' + pillLeft + 'px;transform:translateX(-50%);z-index:3;';
      chart.appendChild(pill);
    });
  });
})();

// ===================== VOLUME (STACKED CHART) =====================
(function() {
  const v = DATA.volume;
  const days = DATA.daily;
  const maxCombined = Math.max(...days.map(d => d.outcomeVol + d.hlVol));

  let stackedHtml = '';
  days.forEach((d, i) => {
    const totalH = Math.max(4, Math.round(((d.outcomeVol + d.hlVol) / maxCombined) * 190));
    const outcomeH = Math.max(2, Math.round((d.outcomeVol / (d.outcomeVol + d.hlVol)) * totalH));
    const hlH = totalH - outcomeH;
    const divider = (i === 7) ? '<div class="week-divider"><div class="week-divider-label">WEEK 2</div></div>' : '';
    stackedHtml += `
      <div class="stacked-bar-wrap">
        ${divider}
        <div class="stacked-bar hl" style="height:${hlH}px"></div>
        <div class="stacked-bar outcome" style="height:${outcomeH}px"></div>
        <div class="stacked-bar-date">${d.date.split(' ')[1]}</div>
      </div>`;
  });

  document.getElementById('volumeCard').innerHTML = `
    <div class="card-header">
      <div class="card-title"><div class="dot" style="background:#45E85C"></div> TRADING VOLUME · OUTCOME vs HYPERLIQUID</div>
      <div class="card-meta">STACKED DAILY VOLUME</div>

    <div class="volume-grid">
      <div>
        <div class="volume-col-label">Platform Volume</div>
        <div class="volume-big" style="color:#F58220">${formatPercent(v.platformShare)}</div>
        <div class="volume-of">OF HL</div>
        <div class="volume-bar-track">
          <div class="volume-bar-fill" style="width:${Math.min(v.platformShare, 100)}%;background:#45E85C"></div>
        </div>
        <div class="volume-legend"><span style="color:#45E85C">&#9679;</span> Outcome ${formatCompactShort(v.outcomeTotal)} &nbsp; <span style="color:rgba(255,255,255,0.3)">&#9679;</span> HL ${formatCompactShort(v.hlTotal)}</div>
        <div style="font-size:10px;font-weight:500;color:rgba(255,255,255,0.35);margin-top:12px;">W1 ${formatPercent(DATA.week1.platformShare)} → W2 ${formatPercent(DATA.week2.platformShare)}</div>
      </div>
      <div>
        <div class="volume-col-label">World Cup Markets</div>
        <div class="volume-big" style="color:#F58220">${formatPercent(v.wcShare)}</div>
        <div class="volume-of">OF HL WC</div>
        <div class="volume-bar-track">
          <div class="volume-bar-fill" style="width:${Math.min(v.wcShare, 100)}%;background:#45E85C"></div>
        </div>
        <div class="volume-legend"><span style="color:#F58220">&#9679;</span> Outcome ${formatCompactShort(v.outcomeWC)} &nbsp; <span style="color:rgba(255,255,255,0.3)">&#9679;</span> HL WC ${formatCompactShort(v.hlWC)}</div>
        <div style="font-size:10px;font-weight:500;color:rgba(255,255,255,0.35);margin-top:12px;">W1 ${formatPercent(DATA.week1.wcShare)} → W2 ${formatPercent(DATA.week2.wcShare)}</div>
      </div>
      <div>
        <div class="volume-col-label">Outcome vs HL Daily (Stacked)</div>
        <div class="stacked-chart" style="position:relative">${stackedHtml}</div>
        <div style="display:flex;gap:16px;margin-top:12px">
          <div style="display:flex;align-items:center;gap:6px">
            <div style="width:10px;height:10px;border-radius:2px;background:#45E85C"></div>
            <span style="font-size:9px;font-weight:500;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.06em">Outcome</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <div style="width:10px;height:10px;border-radius:2px;background:rgba(255,255,255,0.12)"></div>
            <span style="font-size:9px;font-weight:500;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.06em">Hyperliquid</span>
          </div>
        </div>
      </div>
    </div>`;
})();

// ===================== IMPRESSIONS =====================
(function() {
  const channels = DATA.channelImpressions;
  const maxViews = Math.max(...channels.map(c => c.views));
  const totalViews = channels.reduce((s, c) => s + c.views, 0);
  const sorted = [...channels].sort((a, b) => b.views - a.views);
  const topChannel = sorted[0];
  const secondChannel = sorted[1];
  const topPct = totalViews > 0 ? ((topChannel.views / totalViews) * 100).toFixed(0) : 0;
  const ratio = secondChannel && secondChannel.views > 0 ? (topChannel.views / secondChannel.views).toFixed(1) : 'N/A';

  let rowsHtml = '';
  channels.forEach(c => {
    const w = maxViews > 0 ? (c.views / maxViews * 100) : 0;
    rowsHtml += `
      <div class="imp-row">
        <div class="imp-channel"><div class="dot" style="background:${c.color}"></div>${c.name}</div>
        <div class="imp-bar-track">
          <div class="imp-bar-fill" style="width:${w}%;background:${c.color};opacity:0.7"></div>
        </div>
        <div class="imp-value">${formatCompact(c.views)}</div>
      </div>`;
  });

  const axisMax = Math.ceil(maxViews / 1000000) * 1000000;
  let axisHtml = '';
  for (let i = 0; i <= 4; i++) {
    const v = (axisMax / 4) * i;
    axisHtml += `<span>${v === 0 ? '0' : formatCompact(v)}</span>`;
  }

  document.getElementById('impressionsCard').innerHTML = `
    <div class="card-header">
      <div class="card-title"><div class="dot" style="background:#45E85C"></div> IMPRESSIONS BY CHANNEL</div>
      <div class="card-meta">REACH · JUN 10 – 23</div>
    </div>
    <div class="imp-chart">
      ${rowsHtml}
      <div class="imp-axis">${axisHtml}</div>
    </div>
    <div class="imp-callouts">
      <div class="imp-callout"><strong>${topPct}%</strong> of reach via ${topChannel.name}</div>
      <div class="imp-callout"><strong>${ratio}x</strong> larger than the next channel</div>
    </div>`;
})();

// ===================== TG SPONSORSHIP FUNNEL =====================
(function() {
  const f = DATA.tgFunnel;
  const stages = [
    { label: 'Impressions', value: f.impressions, color: '#45E85C', rate: '' },
    { label: 'Clicks', value: f.clicks, color: '#1FCFA0', rate: (f.clicks / f.impressions * 100).toFixed(2) + '% CTR' },
    { label: 'Signups', value: f.signups, color: '#3B82F6', rate: (f.signups / f.clicks * 100).toFixed(1) + '% conv' },
    { label: 'Traders', value: f.estTraders, color: '#9B7CFF', rate: (f.estTraders / f.signups * 100).toFixed(0) + '% conv', estimated: true }
  ];

  // Log scale: map each value to a percentage of bar width
  // log10(108) ≈ 2.03, log10(3.89M) ≈ 6.59. Range ~4.5 orders of magnitude.
  const logMax = Math.log10(stages[0].value);
  const logMin = Math.log10(stages[stages.length - 1].value);

  let rowsHtml = '';
  stages.forEach(s => {
    const logW = ((Math.log10(s.value) - logMin) / (logMax - logMin)) * 90 + 10;
    const estTag = s.estimated ? '<span class="funnel-est-tag">EST</span>' : '';
    rowsHtml += `
      <div class="funnel-row">
        <div class="funnel-channel"><div class="dot" style="background:${s.color}"></div>${s.label}${estTag}</div>
        <div class="funnel-bar-track">
          <div class="funnel-bar-fill" style="width:${logW.toFixed(1)}%;background:${s.color};opacity:0.7"></div>
        </div>
        <div class="funnel-value">${formatCompact(s.value)}</div>
        <div class="funnel-rate">${s.rate}</div>
      </div>`;
  });

  const cpm = (f.spend / f.impressions * 1000).toFixed(2);
  const cpc = (f.spend / f.clicks).toFixed(2);
  const cpa = (f.spend / f.signups).toFixed(2);
  const cpt = (f.spend / f.estTraders).toFixed(2);

  document.getElementById('tgFunnelCard').innerHTML = `
    <div class="card-header">
      <div class="card-title"><div class="dot" style="background:#45E85C"></div> TG WC SPONSORSHIP FUNNEL</div>
      <div class="card-meta">$${formatNumber(f.spend)} SPEND · 79% OF REACH</div>
    </div>
    <div style="margin-top:8px">
      ${rowsHtml}
    </div>
    <div class="cost-grid" style="margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.05)">
      <div class="cost-card" style="padding:18px">
        <div class="cost-label" style="margin-bottom:10px">CPM</div>
        <div class="cost-value" style="font-size:28px">$${cpm}</div>
        <div class="cost-sub" style="margin-top:8px">per 1,000 impressions</div>
      </div>
      <div class="cost-card" style="padding:18px">
        <div class="cost-label" style="margin-bottom:10px">CPC</div>
        <div class="cost-value" style="font-size:28px">$${cpc}</div>
        <div class="cost-sub" style="margin-top:8px">per click</div>
      </div>
      <div class="cost-card" style="padding:18px">
        <div class="cost-label" style="margin-bottom:10px">CPA</div>
        <div class="cost-value" style="font-size:28px">$${cpa}</div>
        <div class="cost-sub" style="margin-top:8px">per signup</div>
      </div>
      <div class="cost-card" style="padding:18px">
        <div class="cost-label" style="margin-bottom:10px">CPT</div>
        <div class="cost-value" style="font-size:28px">$${cpt}</div>
        <div class="cost-sub" style="margin-top:8px">per first-time trader</div>
      </div>
    </div>`;
})();

// ===================== SIGNUP COHORT CONVERSION (POSTHOG) =====================
(function() {
  const cohorts = DATA.signupCohorts;
  const totalSignups = cohorts.reduce((s, c) => s + c.signups, 0);
  const totalTraders = cohorts.reduce((s, c) => s + c.everTraded, 0);
  const maxSignups = Math.max(...cohorts.map(c => c.signups));
  const overallRate = ((totalTraders / totalSignups) * 100).toFixed(1);

  let rowsHtml = '';
  cohorts.forEach((c, i) => {
    const tradedW = (c.everTraded / maxSignups * 100).toFixed(1);
    const neverW = ((c.signups - c.everTraded) / maxSignups * 100).toFixed(1);
    const ratePct = (c.rate * 100).toFixed(1);
    const weekTag = i === 0 ? ' <span style="font-size:8px;color:rgba(255,255,255,0.25);margin-left:4px">W1</span>' : (i === 7 ? ' <span style="font-size:8px;color:rgba(255,255,255,0.25);margin-left:4px">W2</span>' : '');
    const borderStyle = i === 6 ? 'border-bottom:1px solid rgba(255,255,255,0.15)' : '';
    const isRecent = i >= 12;
    const recentNote = isRecent ? '<span style="font-size:7px;color:rgba(255,255,255,0.25);margin-left:4px">NEW</span>' : '';

    rowsHtml += `
      <div class="waterfall-row">
        <div class="waterfall-label" style="${borderStyle}">
          <span class="waterfall-label-date">${c.date}${weekTag}</span>
          <span class="waterfall-label-day">${c.day}</span>
        </div>
        <div class="waterfall-bars" style="${borderStyle}">
          <div class="waterfall-seg traders" style="width:${tradedW}%" title="${c.everTraded} ever traded">${c.everTraded > 20 ? c.everTraded : ''}</div>
          <div class="waterfall-seg dormant" style="width:${neverW > 0 ? neverW : 0}%" title="${c.signups - c.everTraded} never traded"></div>
        </div>
        <div style="display:flex;align-items:center;justify-content:flex-end;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);${borderStyle};white-space:nowrap">
          <span style="font-size:9px;color:rgba(255,255,255,0.4)">${c.signups} signups · <span style="color:${c.rate >= 0.5 ? '#45E85C' : c.rate >= 0.35 ? '#F58220' : 'rgba(255,255,255,0.5)'};font-weight:600">${ratePct}%</span>${recentNote}</span>
        </div>
      </div>`;
  });

  document.getElementById('cohortCard').innerHTML = `
    <div class="card-header">
      <div class="card-title"><div class="dot" style="background:#45E85C"></div> DAILY SIGNUP COHORTS · EVER TRADED</div>
      <div class="card-meta">POSTHOG DATA · ${overallRate}% OVERALL CONVERSION · ${formatNumber(totalSignups)} SIGNUPS → ${formatNumber(totalTraders)} TRADERS</div>
    </div>
    <div class="waterfall-grid">
      <div class="waterfall-header">
        <div class="waterfall-header-label">Cohort Day</div>
        <div class="waterfall-header-label">Signup → Trader Conversion</div>
        <div class="waterfall-header-label" style="text-align:right"></div>
      </div>
      ${rowsHtml}
    </div>
    <div class="waterfall-legend">
      <div class="waterfall-legend-item"><div class="waterfall-legend-dot" style="background:#3B82F6"></div> Ever Traded</div>
      <div class="waterfall-legend-item"><div class="waterfall-legend-dot" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15)"></div> Never Traded</div>
      <div class="waterfall-legend-item" style="margin-left:auto;font-size:9px;color:rgba(255,255,255,0.35)">Source: PostHog signup cohort analysis as of Jun 23</div>
    </div>`;
})();

// ===================== WEEKLY TRADER RETENTION (POSTHOG) =====================
(function() {
  const weeks = DATA.weeklyRetention;
  const maxCohort = Math.max(...weeks.map(w => w.cohortSize));

  let rowsHtml = '';
  weeks.forEach((w, i) => {
    const cohortW = (w.cohortSize / maxCohort * 80).toFixed(1);
    const ret7W = w.ret7d ? (w.ret7d / maxCohort * 80).toFixed(1) : 0;
    const ret14W = w.ret14d ? (w.ret14d / maxCohort * 80).toFixed(1) : 0;
    const rate7 = w.rate7d ? (w.rate7d * 100).toFixed(1) + '%' : '...';
    const rate14 = w.rate14d ? (w.rate14d * 100).toFixed(1) + '%' : '...';
    const isCampaign = w.label.startsWith('Campaign');

    rowsHtml += `
      <tr style="border-bottom:1px solid rgba(255,255,255,0.04)">
        <td style="padding:12px 12px 12px 0;vertical-align:middle">
          <div style="font-size:11px;font-weight:600;color:#F5F8FF">${w.week}</div>
          <div style="font-size:9px;color:${isCampaign ? '#45E85C' : 'rgba(255,255,255,0.35)'};text-transform:uppercase">${w.label}</div>
        </td>
        <td style="padding:12px 16px;text-align:right;vertical-align:middle">
          <span style="font-size:13px;font-weight:600;color:#F5F8FF">${formatNumber(w.cohortSize)}</span>
        </td>
        <td style="padding:12px 0;vertical-align:middle">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="height:20px;border-radius:3px;background:rgba(69,232,92,0.25);width:${cohortW}%;position:relative">
              ${w.ret7d ? '<div style="height:100%;border-radius:3px;background:#45E85C;width:' + ((w.ret7d / w.cohortSize) * 100).toFixed(1) + '%"></div>' : ''}
            </div>
          </div>
        </td>
        <td style="padding:12px 8px;text-align:center;vertical-align:middle;min-width:50px">
          <span style="font-size:12px;font-weight:600;color:${w.rate7d ? '#45E85C' : 'rgba(255,255,255,0.2)'}">${rate7}</span>
        </td>
        <td style="padding:12px 8px;text-align:center;vertical-align:middle;min-width:50px">

// ===================== DAILY TOTALS =====================
(function() {
  const metrics = [
    { key: 'visits', label: 'Visits' },
    { key: 'signups', label: 'Signups' },
    { key: 'traders', label: 'Traders' }
  ];

  function renderDailyChart(metricKey) {
    let barsHtml = '';
    if (metricKey === 'visits') {
      const maxVal = Math.max(...DATA.daily.map(d => Math.max(d.visitors, d.clicks)));
      DATA.daily.forEach((d, i) => {
        const barMax = Math.max(d.visitors, d.clicks);
        const totalH = maxVal > 0 ? Math.round((barMax / maxVal) * 160) : 0;
        const clickH = Math.min(totalH, barMax > 0 ? Math.round((d.clicks / barMax) * totalH) : 0);
        const organicH = totalH - clickH;
        barsHtml += `
          <div class="daily-bar-wrap">
            <div class="daily-bar-val">${formatNumber(barMax)}</div>
            <div style="display:flex;flex-direction:column;width:100%;height:${totalH}px">
              <div style="flex:0 0 ${organicH}px;background:rgba(255,255,255,0.08);border-radius:4px 4px 0 0"></div>
              <div style="flex:0 0 ${clickH}px;background:#3B82F6;border-radius:${organicH === 0 ? '4px 4px' : '0 0'} 0 0"></div>
            </div>
            <div class="daily-bar-date">${d.date.split(' ')[1]}</div>
            <div class="daily-bar-day">${d.day}</div>
          </div>`;
      });
    } else {
      const vals = DATA.daily.map(d => d[metricKey]);
      const maxVal = Math.max(...vals);
      DATA.daily.forEach((d, i) => {
        const h = maxVal > 0 ? Math.round((vals[i] / maxVal) * 160) : 0;
        const weekClass = d.week === 1 ? 'w1' : 'w2';
        barsHtml += `
          <div class="daily-bar-wrap">
            <div class="daily-bar-val">${formatNumber(vals[i])}</div>
            <div class="daily-bar ${weekClass}" style="height:${h}px"></div>
            <div class="daily-bar-date">${d.date.split(' ')[1]}</div>
            <div class="daily-bar-day">${d.day}</div>
          </div>`;
      });
    }
    return barsHtml;
  }

  function getLegend(metricKey) {
    if (metricKey === 'visits') {
      return `
        <div style="display:flex;gap:16px;margin-top:12px">
          <div style="display:flex;align-items:center;gap:6px">
            <div style="width:10px;height:10px;border-radius:2px;background:#3B82F6"></div>
            <span style="font-size:9px;font-weight:500;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.06em">Marketing Clicks</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <div style="width:10px;height:10px;border-radius:2px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15)"></div>
            <span style="font-size:9px;font-weight:500;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.06em">Organic / Direct</span>
          </div>
        </div>`;
    }
    return `
      <div style="display:flex;gap:16px;margin-top:12px">
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:10px;height:10px;border-radius:2px;background:#45E85C"></div>
          <span style="font-size:9px;font-weight:500;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.06em">Week 1</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:10px;height:10px;border-radius:2px;background:#3B82F6"></div>
          <span style="font-size:9px;font-weight:500;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.06em">Week 2</span>
        </div>
      </div>`;
  }

  let btnsHtml = '';
  metrics.forEach((m, i) => {
    btnsHtml += `<button class="metric-btn${i === 0 ? ' active' : ''}" data-metric="${m.key}">${m.label}</button>`;
  });

  document.getElementById('dailyCard').innerHTML = `
    <div class="card-header">
      <div class="card-title"><div class="dot" style="background:#45E85C"></div> DAILY TOTALS</div>
      <div class="metric-switcher">${btnsHtml}</div>
    </div>
    <div class="daily-subtitle" id="dailySubtitle">${metrics[0].label} · Jun 10 – 23</div>
    <div class="daily-chart" id="dailyChartArea">${renderDailyChart(metrics[0].key)}</div>
    <div id="dailyLegend">${getLegend(metrics[0].key)}</div>`;

  document.querySelectorAll('.metric-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.metric-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      const mk = this.dataset.metric;
      const label = metrics.find(m => m.key === mk).label;
      document.getElementById('dailySubtitle').textContent = label + ' · Jun 10 – 23';
      document.getElementById('dailyChartArea').innerHTML = renderDailyChart(mk);
      document.getElementById('dailyLegend').innerHTML = getLegend(mk);
    });
  });
})();
