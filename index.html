document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

255,255,255,0.4);text-align:right;\">Signups<\u002Fspan>\n          <span class=\"mono\" style=\"font-size:10px;font-weight:500;letter-spacing:0.06em;color:rgba(255,255,255,0.4);text-align:right;\">Depositors<\u002Fspan>\n          <span class=\"mono\" style=\"font-size:10px;font-weight:500;letter-spacing:0.06em;color:rgba(255,255,255,0.4);text-align:right;\">Traders<\u002Fspan>\n          <span class=\"mono\" style=\"font-size:10px;font-weight:500;letter-spacing:0.06em;color:rgba(255,255,255,0.4);text-align:right;\">Outcome Vol.<\u002Fspan>\n          <span class=\"mono\" style=\"font-size:10px;font-weight:500;letter-spacing:0.06em;color:rgba(255,255,255,0.4);text-align:right;\">HL Share<\u002Fspan>\n        <\u002Fdiv>\n        <sc-for list=\"{{ tableRows }}\" as=\"r\" hint-placeholder-count=\"7\">\n          <div style=\"display:grid;grid-template-columns:1.3fr repeat(8,1fr);column-gap:8px;align-items:center;padding:14px 10px;border-bottom:1px solid rgba(255,255,255,0.05);\">\n            <span><span style=\"font-size:14px;font-weight:600;color:#F5F8FF;\">{{ r.day }}<\u002Fspan><span class=\"mono\" style=\"font-size:10px;font-weight:500;color:rgba(255,255,255,0.4);margin-left:8px;\">{{ r.dow }}<\u002Fspan><\u002Fspan>\n            <span style=\"font-size:14px;font-weight:500;letter-spacing:-0.02em;color:rgba(245,248,255,0.75);text-align:right;\">{{ r.imp }}<\u002Fspan>\n            <span style=\"font-size:14px;font-weight:500;letter-spacing:-0.02em;color:rgba(245,248,255,0.75);text-align:right;\">{{ r.clicks }}<\u002Fspan>\n            <span style=\"font-size:14px;font-weight:500;letter-spacing:-0.02em;color:rgba(245,248,255,0.75);text-align:right;\">{{ r.visitors }}<\u002Fspan>\n            <span style=\"font-size:14px;font-weight:600;letter-spacing:-0.02em;color:#45E85C;text-align:right;\">{{ r.signups }}<\u002Fspan>\n            <span style=\"font-size:14px;font-weight:500;letter-spacing:-0.02em;color:rgba(245,248,255,0.75);text-align:right;\">{{ r.depositors }}<\u002Fspan>\n            <span style=\"font-size:14px;font-weight:500;letter-spacing:-0.02em;color:rgba(245,248,255,0.75);text-align:right;\">{{ r.traders }}<\u002Fspan>\n            <span style=\"font-size:14px;font-weight:600;letter-spacing:-0.02em;color:#F58220;text-align:right;\">{{ r.vol }}<\u002Fspan>\n            <span style=\"font-size:14px;font-weight:500;letter-spacing:-0.02em;color:rgba(245,248,255,0.75);text-align:right;\">{{ r.share }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"display:grid;grid-template-columns:1.3fr repeat(8,1fr);column-gap:8px;align-items:center;padding:15px 10px;\">\n          <span class=\"mono\" style=\"font-size:11px;font-weight:600;letter-spacing:0.06em;color:#45E85C;\">Week 1<\u002Fspan>\n          <span style=\"font-size:14px;font-weight:700;letter-spacing:-0.02em;color:#F5F8FF;text-align:right;\">{{ totals.imp }}<\u002Fspan>\n          <span style=\"font-size:14px;font-weight:700;letter-spacing:-0.02em;color:#F5F8FF;text-align:right;\">{{ totals.clicks }}<\u002Fspan>\n          <span style=\"font-size:14px;font-weight:700;letter-spacing:-0.02em;color:#F5F8FF;text-align:right;\">{{ totals.visitors }}<\u002Fspan>\n          <span style=\"font-size:14px;font-weight:700;letter-spacing:-0.02em;color:#45E85C;text-align:right;\">{{ totals.signups }}<\u002Fspan>\n          <span style=\"font-size:14px;font-weight:700;letter-spacing:-0.02em;color:#F5F8FF;text-align:right;\">{{ totals.depositors }}<\u002Fspan>\n          <span style=\"font-size:14px;font-weight:700;letter-spacing:-0.02em;color:#F5F8FF;text-align:right;\">{{ totals.traders }}<\u002Fspan>\n          <span style=\"font-size:14px;font-weight:700;letter-spacing:-0.02em;color:#F58220;text-align:right;\">{{ totals.vol }}<\u002Fspan>\n          <span style=\"font-size:14px;font-weight:700;letter-spacing:-0.02em;color:#F5F8FF;text-align:right;\">{{ totals.share }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mono\" style=\"font-size:10px;font-weight:500;letter-spacing:0.06em;color:rgba(255,255,255,0.3);margin-top:18px;text-align:center;\">Source · Outcome World Cup Campaign Tracker · Conversions via PostHog · Volume vs Hyperliquid perps<\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1480,&quot;height&quot;:1560},&quot;defaultMetric&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;signups&quot;,&quot;clicks&quot;,&quot;visitors&quot;,&quot;traders&quot;],&quot;default&quot;:&quot;signups&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = { metric: null };\n\n  get metric() { return this.state.metric || this.props.defaultMetric || 'signups'; }\n\n  fmt(n) {\n    if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';\n    if (n >= 1e4) return (n / 1e3).toFixed(1) + 'K';\n    return n.toLocaleString('en-US');\n  }\n  money(n) {\n    if (n >= 1e7) return '$' + (n / 1e6).toFixed(1) + 'M';\n    if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';\n    if (n >= 1e3) return '$' + Math.round(n / 1e3) + 'K';\n    return '$' + n.toLocaleString('en-US');\n  }\n  comma(n) { return n.toLocaleString('en-US'); }\n\n  renderVals() {\n    // palette\n    const C = { green:'#45E85C', lime:'#DDF23D', orange:'#F58220', teal:'#1FCFA0', blue:'#3B82F6', purple:'#9B7CFF', pink:'#FF5C9E', red:'#FF4D4D', sky:'#5BC0FF' };\n\n    const days = [\n      { day: 'Jun 10', dow: 'Wed', imp: 186759, clicks: 38,   visitors: 1872, signups: 520, depositors: 10, traders: 99,  volO: 122600, volWC: 16800,  share: 3.6 },\n      { day: 'Jun 11', dow: 'Thu', imp: 896235, clicks: 1802, visitors: 4527, signups: 416, depositors: 35, traders: 194, volO: 172500, volWC: 98300,  share: 2.8 },\n      { day: 'Jun 12', dow: 'Fri', imp: 97698,  clicks: 1672, visitors: 3147, signups: 183, depositors: 25, traders: 172, volO: 373000, volWC: 157300, share: 7.8 },\n      { day: 'Jun 13', dow: 'Sat', imp: 85142,  clicks: 1611, visitors: 2354, signups: 138, depositors: 28, traders: 161, volO: 180300, volWC: 111900, share: 3.5 },\n      { day: 'Jun 14', dow: 'Sun', imp: 3051,   clicks: 1608, visitors: 2002, signups: 89,  depositors: 23, traders: 161, volO: 186500, volWC: 136100, share: 3.9 },\n      { day: 'Jun 15', dow: 'Mon', imp: 1705,   clicks: 1644, visitors: 2756, signups: 134, depositors: 13, traders: 176, volO: 142903, volWC: 181500, share: 3.5 },\n      { day: 'Jun 16', dow: 'Tue', imp: 15970,  clicks: 2481, visitors: 1421, signups: 180, depositors: 35, traders: 174, volO: 216200, volWC: 108100, share: 2.8 },\n    ];\n\n    // reach (impressions by channel)\n    const reachData = [\n      { name: 'Telegram WC Sponsor', v: 892200, color: C.green },\n      { name: 'X Organic',           v: 301549, color: C.blue },\n      { name: 'Telegram Ads',        v: 161740, color: C.teal },\n      { name: 'X Giveaways',         v: 79075,  color: C.pink },\n      { name: 'Telegram Organic',    v: 119,    color: C.orange },\n    ];\n    const reachMax = 1000000;\n    const reach = reachData.map((r, i) => ({\n      name: r.name,\n      val: this.fmt(r.v),\n      wpct: Math.max(0.3, (r.v / reachMax) * 100) + '%',\n      rowH: i === 0 ? '40px' : '30px',\n      barH: i === 0 ? '22px' : '13px',\n      barColor: r.color,\n      glow: i === 0 ? '0 0 18px rgba(69,232,92,0.5)' : 'none',\n      labelColor: i === 0 ? C.green : 'rgba(255,255,255,0.78)',\n      labelSize: i === 0 ? '15px' : '13px',\n      valColor: i === 0 ? C.green : 'rgba(255,255,255,0.6)',\n      valSize: i === 0 ? '22px' : '13px',\n    }));\n\n    // conversions by source\n    const chans = [\n      { name: 'Telegram WC Sponsor', visitors: 7336,  signups: 176,  traders: 0,    color: C.green },\n      { name: 'X Organic',           visitors: 55,    signups: 5,    traders: 1,    color: C.blue },\n      { name: 'Telegram Ads',        visitors: 113,   signups: 17,   traders: 0,    color: C.teal },\n      { name: 'X Giveaways',         visitors: 0,     signups: 0,    traders: 0,    color: C.pink },\n      { name: 'Telegram Organic',    visitors: 26,    signups: 4,    traders: 0,    color: C.orange },\n      { name: 'Discord Organic',     visitors: 0,     signups: 0,    traders: 0,    color: C.purple },\n      { name: 'CoConnect (Alphabot)',visitors: 10,    signups: 13,   traders: 0,    color: C.lime },\n      { name: 'Substack',            visitors: 6,     signups: 0,    traders: 3,    color: C.red },\n      { name: 'HL S2 Analyzer',      visitors: 0,     signups: 0,    traders: 1,    color: C.sky },\n      { name: 'Unattributed',        visitors: 10519, signups: 1686, traders: 1075, color: 'rgba(255,255,255,0.4)' },\n    ];\n\n    const metricMeta = {\n      signups:  { label: 'Signups',  field: 'signups',  fill: C.green,  glow: '0 0 22px rgba(69,232,92,0.3)' },\n      clicks:   { label: 'Clicks',   field: 'clicks',   fill: C.lime,   glow: '0 0 22px rgba(221,242,61,0.25)' },\n      visitors: { label: 'Visitors', field: 'visitors', fill: C.teal,   glow: '0 0 22px rgba(31,207,160,0.25)' },\n      traders:  { label: 'Traders',  field: 'traders',  fill: C.pink,   glow: '0 0 22px rgba(255,92,158,0.25)' },\n    };\n    const mKey = this.metric;\n    const meta = metricMeta[mKey];\n    const field = meta.field;\n    const max = Math.max(...days.map(d => d[field])) || 1;\n\n    const bars = days.map(d => ({\n      day: d.day.replace('Jun ', ''),\n      dow: d.dow,\n      valLabel: this.fmt(d[field]),\n      labelColor: d[field] === 0 ? 'rgba(255,255,255,0.3)' : meta.fill,\n      hpct: Math.round((d[field] / max) * 100) + '%',\n      fill: meta.fill,\n      glow: meta.glow,\n    }));\n\n    const metricTabs = ['signups', 'clicks', 'visitors', 'traders'].map(k => {\n      const active = k === mKey;\n      return {\n        label: metricMeta[k].label,\n        bg: active ? metricMeta[k].fill : 'transparent',\n        fg: active ? '#0A0A0B' : 'rgba(255,255,255,0.55)',\n        onClick: () => this.setState({ metric: k }),\n      };\n    });\n\n    const maxVol = Math.max(...days.map(d => d.volO)) || 1;\n    const volBars = days.map(d => {\n      const base = Math.max(0, d.volO - d.volWC);\n      return {\n        day: d.day.replace('Jun ', ''),\n        label: '$' + Math.round(d.volO / 1e3) + 'K',\n        hpct: Math.round((d.volO / maxVol) * 100) + '%',\n        greenFlex: base,\n        yellowFlex: d.volWC,\n      };\n    });\n\n    const channels = chans.map(c => ({\n      name: c.name, color: c.color,\n      visitors: this.comma(c.visitors), signups: this.comma(c.signups), traders: this.comma(c.traders),\n    }));\n    const chanTot = { visitors: this.comma(18065), signups: this.comma(1901), traders: this.comma(1080) };\n\n    const tableRows = days.map(d => ({\n      day: d.day, dow: d.dow,\n      imp: this.comma(d.imp), clicks: this.comma(d.clicks), visitors: this.comma(d.visitors),\n      signups: this.comma(d.signups), depositors: this.comma(d.depositors), traders: this.comma(d.traders),\n      vol: this.money(d.volO), share: d.share.toFixed(1) + '%',\n    }));\n\n    const totals = {\n      imp: this.comma(1286560), clicks: this.comma(10856), visitors: this.comma(18079),\n      signups: this.comma(1660), depositors: this.comma(169), traders: this.comma(1137),\n      vol: this.money(1394003), share: '3.9%',\n    };\n\n    const kpis = [\n      { label: 'Impressions',    value: this.fmt(1286560), sub: '$37.59 CPM',           color: C.orange },\n      { label: 'Link Clicks',    value: this.comma(10856), sub: '0.84% CTR · $4.46 CPC', color: C.blue },\n      { label: 'Unique Visitors',value: this.comma(18079), sub: 'site reach',            color: C.teal },\n      { label: 'Signups',        value: this.comma(1660),  sub: '$29.14 per signup',     color: C.green },\n      { label: 'Depositors',     value: this.comma(169),   sub: '10.2% of signups',      color: C.pink },\n      { label: 'Active Traders', value: this.comma(1137),  sub: '68% of signups',        color: C.purple },\n    ];\n\n    return {\n      kpis, bars, metricTabs, volBars, reach, channels, chanTot, tableRows, totals,\n      metricLabel: meta.label, metricColor: meta.fill,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
