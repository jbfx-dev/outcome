<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outcome.xyz - World Cup 2026 Campaign Dashboard - Week 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: "PP Neue Corp";
  src: url("fonts/PPNeueCorp-Medium.otf") format("opentype");
  font-weight: 500;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: "PP Neue Corp";
  src: url("fonts/PPNeueCorp-ExtraBoldCondensed.otf") format("opentype");
  font-weight: 800;
  font-style: normal;
  font-stretch: condensed;
  font-display: swap;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
body {
  background: #0A0A0B;
  color: #F5F8FF;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
}

/* ---------- NAV ---------- */
.nav {
  position: sticky; top: 0; z-index: 20;
  height: 64px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  background: rgba(10,10,11,0.74);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}
.nav-left { display: flex; align-items: center; gap: 10px; }
.nav-logo { height: 20px; width: auto; flex-shrink: 0; }
.nav-divider { color: rgba(255,255,255,0.25); font-weight: 300; font-size: 17px; }
.nav-subtitle {
  font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
  color: rgba(255,255,255,0.5);
}
.nav-right { display: flex; align-items: center; gap: 12px; }
.live-badge {
  height: 30px; padding: 0 14px; border-radius: 8px;
  border: 1px solid rgba(255,92,92,0.4);
  display: flex; align-items: center; gap: 8px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
  color: rgb(255,92,92); text-transform: uppercase;
}
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: radial-gradient(circle, rgb(255,92,92) 0%, rgba(255,92,92,0.4) 100%);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}
.date-badge {
  height: 38px; padding: 0 16px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.12);
  display: flex; align-items: center;
  font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.7); text-transform: uppercase;
}

/* ---------- CONTENT ---------- */
.content {
  max-width: 1480px; margin: 0 auto;
  padding: 44px 40px 64px;
}

/* ---------- WEEK NAV ---------- */
.week-nav {
  display: flex; gap: 8px; padding: 12px 0; margin-bottom: 20px;
}
.week-nav a {
  font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 8px 16px; border-radius: 8px;
  cursor: pointer; text-decoration: none;
  color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.08);
  transition: all 0.15s ease;
}
.week-nav a:hover { color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.12); }
.week-nav a.active {
  color: #F5F8FF; background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
}

/* ---------- TITLE ---------- */
.title-area {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 32px; flex-wrap: wrap; margin-bottom: 34px;
}
.title-left {}
.title-sub {
  font-size: 12px; font-weight: 500; letter-spacing: 0.16em;
  color: #45E85C; margin-bottom: 16px; text-transform: uppercase;
}
.title-h1 {
  font-family: 'PP Neue Corp', 'Inter', system-ui, sans-serif; font-weight: 800;
  font-stretch: condensed; text-transform: uppercase;
  letter-spacing: -0.01em; font-size: 64px; line-height: 0.88;
  color: #F5F8FF;
}
.title-h1 .green { color: #45E85C; }
.title-badges { display: flex; gap: 10px; align-items: center; }
.badge {
  height: 38px; padding: 0 16px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.12);
  display: flex; align-items: center;
  font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.7); text-transform: uppercase;
}
.badge.orange { color: #F58220; border-color: rgba(245,130,32,0.3); }

/* ---------- KPI CARDS ---------- */
.kpi-grid {
  display: grid; grid-template-columns: repeat(6, 1fr);
  gap: 14px; margin-bottom: 14px;
}
.kpi-card {
  position: relative; padding: 20px; border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.07);
  background: rgba(255,255,255,0.02); overflow: hidden;
}
.kpi-bar {
  position: absolute; top: 0; left: 0; width: 100%; height: 3px;
}
.kpi-label {
  font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 16px;
}
.kpi-value {
  font-family: 'PP Neue Corp', 'Inter', system-ui, sans-serif;
  font-size: 32px; font-weight: 500; letter-spacing: -0.04em;
  line-height: 1; color: #F5F8FF;
}
.kpi-sub {
  font-size: 10px; font-weight: 500; letter-spacing: 0.04em;
  color: rgba(255,255,255,0.45); margin-top: 9px; text-transform: uppercase;
}

/* ---------- CARD ---------- */
.card {
  padding: 28px; border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.07);
  background: rgba(255,255,255,0.02); margin-bottom: 14px;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.card-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase;
}
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.card-meta {
  font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.35); text-transform: uppercase;
}

/* ---------- VOLUME SECTION ---------- */
.volume-grid {
  display: grid; grid-template-columns: 1fr 1fr 1.3fr; gap: 32px;
}
.volume-col-label {
  font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 16px;
}
.volume-big {
  font-family: 'PP Neue Corp', 'Inter', system-ui, sans-serif;
  font-size: 52px; font-weight: 600; line-height: 1; margin-bottom: 4px;
}
.volume-of {
  font-size: 12px; font-weight: 500; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 20px;
}
.volume-bar-track {
  width: 100%; height: 6px; border-radius: 3px;
  background: rgba(255,255,255,0.08); margin-bottom: 12px; overflow: hidden;
}
.volume-bar-fill { height: 100%; border-radius: 3px; }
.volume-legend {
  font-size: 10px; font-weight: 500; letter-spacing: 0.04em;
  color: rgba(255,255,255,0.45); text-transform: uppercase;
}

/* Volume bar chart */
.vol-chart { display: flex; align-items: flex-end; gap: 8px; height: 180px; }
.vol-bar-wrap {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%;
  justify-content: flex-end;
}
.vol-bar-label {
  font-size: 9px; font-weight: 500; color: rgba(255,255,255,0.5);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.vol-bar-stack {
  width: 100%; border-radius: 4px 4px 0 0; overflow: hidden;
  display: flex; flex-direction: column; justify-content: flex-end;
}
.vol-bar-total { background: #45E85C; }
.vol-bar-wc { background: #C4E84A; }
.vol-bar-day {
  font-size: 9px; font-weight: 500; color: rgba(255,255,255,0.4);
  text-transform: uppercase; margin-top: 6px;
}

/* ---------- IMPRESSIONS SECTION ---------- */
.imp-chart { margin-top: 8px; }
.imp-row {
  display: flex; align-items: center; gap: 0; margin-bottom: 10px;
}
.imp-channel {
  width: 200px; flex-shrink: 0;
  font-size: 11px; font-weight: 500; letter-spacing: 0.04em;
  color: rgba(255,255,255,0.7); text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.imp-channel .dot { width: 8px; height: 8px; }
.imp-bar-track {
  flex: 1; height: 28px; border-radius: 4px;
  background: rgba(255,255,255,0.03); overflow: hidden; position: relative;
}
.imp-bar-fill { height: 100%; border-radius: 4px; min-width: 2px; }
.imp-value {
  width: 90px; text-align: right; flex-shrink: 0;
  font-size: 12px; font-weight: 500; letter-spacing: 0.02em;
  color: rgba(255,255,255,0.6); padding-left: 12px;
}
.imp-axis {
  display: flex; justify-content: space-between;
  margin-top: 8px; padding-left: 200px; padding-right: 90px;
}
.imp-axis span {
  font-size: 9px; font-weight: 500; color: rgba(255,255,255,0.25);
  text-transform: uppercase;
}
.imp-callouts {
  display: flex; gap: 32px; margin-top: 20px; padding-top: 16px;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.imp-callout {
  font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.45);
  letter-spacing: 0.04em;
}
.imp-callout strong { color: #F5F8FF; font-weight: 600; }

/* ---------- DAILY + CONVERSIONS SIDE BY SIDE ---------- */
.side-grid {
  display: grid; grid-template-columns: 1fr 0.82fr;
  gap: 14px; margin-bottom: 14px;
}

/* Daily totals chart */
.metric-switcher { display: flex; gap: 6px; }
.metric-btn {
  padding: 6px 14px; border-radius: 8px;
  font-size: 10px; font-weight: 500; letter-spacing: 0.08em;
  text-transform: uppercase; cursor: pointer; border: none; outline: none;
  transition: all 0.15s ease;
  background: transparent; border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.5);
}
.metric-btn.active {
  background: rgba(69,232,92,0.12); border: 1px solid rgba(69,232,92,0.3);
  color: #45E85C;
}
.metric-btn:hover:not(.active) {
  border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.7);
}
.daily-subtitle {
  font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.35); text-transform: uppercase; margin-bottom: 20px;
}
.daily-chart { display: flex; align-items: flex-end; gap: 10px; height: 200px; padding-top: 20px; }
.daily-bar-wrap {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  height: 100%; justify-content: flex-end;
}
.daily-bar-val {
  font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.5);
  margin-bottom: 4px;
}
.daily-bar {
  width: 100%; border-radius: 4px 4px 0 0;
  background: #45E85C; transition: height 0.3s ease;
}
.daily-bar-date {
  font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.6);
  margin-top: 8px;
}
.daily-bar-day {
  font-size: 9px; font-weight: 500; color: rgba(255,255,255,0.3);
  text-transform: uppercase;
}

/* ---------- CONVERSIONS TABLE ---------- */
.conv-table { width: 100%; border-collapse: collapse; }
.conv-table th {
  font-size: 9px; font-weight: 500; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.4); text-transform: uppercase;
  text-align: right; padding: 0 0 12px 0;
}
.conv-table th:first-child { text-align: left; }
.conv-table td {
  padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.7);
  text-align: right;
}
.conv-table td:first-child {
  text-align: left; display: flex; align-items: center; gap: 8px;
}
.conv-table td:first-child .dot { width: 8px; height: 8px; }
.conv-table tr.total td {
  border-bottom: none; font-weight: 600; color: #F5F8FF;
  padding-top: 14px;
}
.conv-table tr.total td:first-child { color: #45E85C; }
.conv-footnote {
  font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.25);
  margin-top: 16px; letter-spacing: 0.04em;
}

/* ---------- DAILY BREAKDOWN TABLE ---------- */
.breakdown-card { padding: 24px 24px 8px; }
.breakdown-subtitle {
  font-size: 10px; font-weight: 500; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.35); text-transform: uppercase;
  margin-bottom: 20px;
}
.breakdown-table { width: 100%; border-collapse: collapse; }
.breakdown-table th {
  font-size: 9px; font-weight: 500; letter-spacing: 0.1em;
  color: rgba(255,255,255,0.4); text-transform: uppercase;
  text-align: right; padding: 0 0 14px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.breakdown-table th:first-child { text-align: left; }
.breakdown-table td {
  padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.6);
  text-align: right;
}
.breakdown-table td:first-child { text-align: left; }
.breakdown-date-main { color: #F5F8FF; font-weight: 600; }
.breakdown-date-day {
  font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.3);
  text-transform: uppercase; margin-left: 6px;
}
.breakdown-table td.green { color: #45E85C; }
.breakdown-table td.orange { color: #F58220; }
.breakdown-table tr.summary-row td {
  border-bottom: none; font-weight: 600; color: #F5F8FF;
  border-top: 1px solid rgba(255,255,255,0.08); padding-top: 16px;
}
.breakdown-table tr.summary-row td:first-child { color: #45E85C; }
.breakdown-footer {
  font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.2);
  margin-top: 16px; padding: 12px 0; letter-spacing: 0.04em;
  text-transform: uppercase; text-align: center;
}

/* ---------- RESPONSIVE ---------- */
@media (max-width: 1200px) {
  .kpi-grid { grid-template-columns: repeat(3, 1fr); }
  .volume-grid { grid-template-columns: 1fr; }
  .side-grid { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .nav { padding: 0 20px; }
  .content { padding: 24px 20px 48px; }
  .title-h1 { font-size: 40px; }
  .volume-big { font-size: 36px; }
}

function formatNumber(n) {
  return n.toLocaleString('en-US');

function formatCompact(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(2).replace(/\.?0+$/, '') + 'M';
  return formatNumber(n);
}
function formatCompactShort(n) {
  if (n >= 1000000) return '$' + (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';

<div class="content">

  <!-- WEEK NAV -->
  <div class="week-nav">
    <a href="index.html">Overall</a>
    <a href="week-1.html" class="active">Week 1</a>
    <a href="week-2.html">Week 2</a>
    <a href="week-3.html">Week 3</a>
    <a href="week-4.html">Week 4</a>
  </div>

  <!-- TITLE -->
  <div class="title-area">
    <div class="title-left">
      <div class="title-sub">WEEKLY ROLLUP · WEEK 1</div>
      <h1 class="title-h1">
        World Cup 2026<br>
        <span class="green">Campaign</span>
      </h1>
    </div>
    <div class="title-badges">
      <div class="badge">7 Days</div>
      <div class="badge orange">$48,365 Spend</div>
    </div>
  </div>

  <!-- KPI CARDS -->
  <div class="kpi-grid" id="kpiGrid"></div>

  <!-- VOLUME -->
  <div class="card" id="volumeCard"></div>

  <!-- IMPRESSIONS -->
  <div class="card" id="impressionsCard"></div>

  <!-- DAILY + CONVERSIONS -->
  <div class="side-grid">
    <div class="card" id="dailyCard"></div>
    <div class="card" id="conversionsCard"></div>
  </div>

  <!-- DAILY BREAKDOWN -->
  <div class="card breakdown-card" id="breakdownCard"></div>

</div>

<script>
// ===================== KPI CARDS =====================
(function() {
  const d = DATA.kpi;
  const spend = DATA.totalSpend;
  const ctr = (d.clicks / d.impressions * 100).toFixed(2);
  const uvPct = (d.clicks / d.visitors * 100).toFixed(1);
  const depPct = (d.depositors / d.signups * 100).toFixed(1);
  const traderPct = (d.activeTraders / d.signups * 100).toFixed(0);

  const kpis = [
    { key: 'impressions', label: 'Impressions', color: '#F58220', sub: 'week 1 total' },
    { key: 'clicks', label: 'Link Clicks', color: '#3B82F6', sub: `${ctr}% CTR · ${uvPct}% of UVs` },
    { key: 'visitors', label: 'Unique Visitors', color: '#1FCFA0', sub: 'site reach' },
    { key: 'signups', label: 'Signups', color: '#45E85C', sub: 'week 1 total' },
    { key: 'depositors', label: 'Depositors', color: '#FF5C9E', sub: `${depPct}% of signups` },
    { key: 'activeTraders', label: 'Active Traders', color: '#9B7CFF', sub: `${traderPct}% of signups` }
  ];
  const grid = document.getElementById('kpiGrid');
  kpis.forEach(k => {
    const val = DATA.kpi[k.key];
    grid.innerHTML += `
      <div class="kpi-card">
        <div class="kpi-bar" style="background:${k.color}"></div>
        <div class="kpi-label" style="color:${k.color}">${k.label}</div>
        <div class="kpi-value">${formatCompact(val)}</div>
        <div class="kpi-sub">${k.sub}</div>
      </div>`;
  });
})();

// ===================== VOLUME =====================
(function() {
  const v = DATA.volume;
  const maxVol = Math.max(...DATA.daily.map(d => d.outcomeVol));

  let barsHtml = '';
  DATA.daily.forEach(d => {
    const totalH = Math.round((d.outcomeVol / maxVol) * 160);
    const wcH = Math.round((d.outcomeWcVol / maxVol) * 160);
    const nonWcH = totalH - wcH;
    barsHtml += `
      <div class="vol-bar-wrap">
        <div class="vol-bar-label">${formatCurrency(d.outcomeVol)}</div>
        <div class="vol-bar-stack" style="width:100%">
          <div class="vol-bar-total" style="height:${nonWcH > 0 ? nonWcH : 0}px"></div>
          <div class="vol-bar-wc" style="height:${wcH}px"></div>
        </div>
        <div class="vol-bar-day">${d.date.split(' ')[1]}</div>
      </div>`;
  });

  document.getElementById('volumeCard').innerHTML = `
    <div class="card-header">
      <div class="card-title"><div class="dot" style="background:#45E85C"></div> TRADING VOLUME VS HYPERLIQUID</div>
      <div class="card-meta">OUTCOME SHARE OF HL HIP-4 VOLUME</div>
    </div>
    <div class="volume-grid">
      <div>
        <div class="volume-col-label">Platform Volume</div>
        <div class="volume-big" style="color:#F58220">${formatPercent(v.platformShare)}</div>
        <div class="volume-of">OF HL</div>
        <div class="volume-bar-track">
          <div class="volume-bar-fill" style="width:${v.platformShare}%; background:#45E85C"></div>
        </div>
        <div class="volume-legend"><span style="color:#45E85C">&#9679;</span> Outcome ${formatCompactShort(v.outcomeTotal)} &nbsp; <span style="color:rgba(255,255,255,0.3)">&#9679;</span> HL ${formatCompactShort(v.hlTotal)}</div>
      </div>
      <div>
        <div class="volume-col-label">World Cup Markets</div>
        <div class="volume-big" style="color:#F58220">${formatPercent(v.wcShare)}</div>
        <div class="volume-of">OF HL WC</div>
        <div class="volume-bar-track">
          <div class="volume-bar-fill" style="width:${v.wcShare}%; background:#45E85C"></div>
        </div>
        <div class="volume-legend"><span style="color:#F58220">&#9679;</span> Outcome ${formatCompactShort(v.outcomeWC)} &nbsp; <span style="color:rgba(255,255,255,0.3)">&#9679;</span> HL WC ${formatCompactShort(v.hlWC)}</div>
      </div>
      <div>
        <div class="volume-col-label">Daily Outcome Volume</div>
        <div class="vol-chart">${barsHtml}</div>
        <div style="display:flex;gap:16px;margin-top:12px">
          <div style="display:flex;align-items:center;gap:6px">
            <div style="width:10px;height:10px;border-radius:2px;background:#45E85C"></div>
            <span style="font-size:9px;font-weight:500;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.06em">Total</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <div style="width:10px;height:10px;border-radius:2px;background:#C4E84A"></div>
            <span style="font-size:9px;font-weight:500;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.06em">World Cup</span>
          </div>
        </div>
      </div>
    </div>`;
})();

// ===================== IMPRESSIONS =====================
(function() {
  const channels = DATA.channelImpressions;
  const maxViews = Math.max(...channels.map(c => c.views));
  const totalViews = channels.reduce((s, c) => s + c.views, 0);
  const sorted = [...channels].sort((a, b) => b.views - a.views);
  const topChannel = sorted[0];
  const secondChannel = sorted[1];
  const topPct = totalViews > 0 ? ((topChannel.views / totalViews) * 100).toFixed(0) : 0;
  const ratio = secondChannel && secondChannel.views > 0 ? (topChannel.views / secondChannel.views).toFixed(1) : 'N/A';

  let rowsHtml = '';
  channels.forEach(c => {
    const w = maxViews > 0 ? (c.views / maxViews * 100) : 0;
    rowsHtml += `
      <div class="imp-row">
        <div class="imp-channel"><div class="dot" style="background:${c.color}"></div>${c.name}</div>
        <div class="imp-bar-track">
          <div class="imp-bar-fill" style="width:${w}%;background:${c.color};opacity:0.7"></div>
        </div>
        <div class="imp-value">${formatCompact(c.views)}</div>
      </div>`;
  });

  const axisMax = Math.ceil(maxViews / 100000) * 100000;
  let axisHtml = '';
  for (let i = 0; i <= 5; i++) {
    const v = (axisMax / 5) * i;
    axisHtml += `<span>${v === 0 ? '0' : formatCompact(v)}</span>`;
  }

  document.getElementById('impressionsCard').innerHTML = `
    <div class="card-header">
      <div class="card-title"><div class="dot" style="background:#45E85C"></div> IMPRESSIONS BY CHANNEL</div>
      <div class="card-meta">REACH · JUN 10 – 16</div>
    </div>
    <div class="imp-chart">
      ${rowsHtml}
      <div class="imp-axis">${axisHtml}</div>
    </div>
    <div class="imp-callouts">
      <div class="imp-callout"><strong>${topPct}%</strong> of reach via ${topChannel.name}</div>
      <div class="imp-callout"><strong>${ratio}x</strong> larger than the next channel</div>
    </div>`;
})();

// ===================== DAILY TOTALS =====================
(function() {
  const metrics = [
    { key: 'visits', label: 'Visits' },
    { key: 'signups', label: 'Signups' },
    { key: 'traders', label: 'Traders' }
  ];

  function renderDailyChart(metricKey) {
    let barsHtml = '';
    if (metricKey === 'visits') {
      const maxVal = Math.max(...DATA.daily.map(d => Math.max(d.visitors, d.clicks)));
      DATA.daily.forEach((d, i) => {
        const barMax = Math.max(d.visitors, d.clicks);
        const totalH = maxVal > 0 ? Math.round((barMax / maxVal) * 160) : 0;
        const clickH = Math.min(totalH, barMax > 0 ? Math.round((d.clicks / barMax) * totalH) : 0);
        const organicH = totalH - clickH;
        barsHtml += `
          <div class="daily-bar-wrap">
            <div class="daily-bar-val">${formatNumber(barMax)}</div>
            <div style="display:flex;flex-direction:column;width:100%;height:${totalH}px">
              <div style="flex:0 0 ${organicH}px;background:rgba(255,255,255,0.08);border-radius:4px 4px 0 0"></div>
              <div style="flex:0 0 ${clickH}px;background:#3B82F6;border-radius:${organicH === 0 ? '4px 4px' : '0 0'} 0 0"></div>
            </div>
            <div class="daily-bar-date">${d.date.split(' ')[1]}</div>
            <div class="daily-bar-day">${d.day}</div>
          </div>`;
      });
    } else {
      const vals = DATA.daily.map(d => d[metricKey]);
      const maxVal = Math.max(...vals);
      DATA.daily.forEach((d, i) => {
        const h = maxVal > 0 ? Math.round((vals[i] / maxVal) * 160) : 0;
        barsHtml += `
          <div class="daily-bar-wrap">
            <div class="daily-bar-val">${formatNumber(vals[i])}</div>
            <div class="daily-bar" style="height:${h}px"></div>
            <div class="daily-bar-date">${d.date.split(' ')[1]}</div>
            <div class="daily-bar-day">${d.day}</div>
          </div>`;
      });
    }
    return barsHtml;
  }

  function getLegend(metricKey) {
    if (metricKey === 'visits') {
      return `
        <div style="display:flex;gap:16px;margin-top:12px">
          <div style="display:flex;align-items:center;gap:6px">
            <div style="width:10px;height:10px;border-radius:2px;background:#3B82F6"></div>
            <span style="font-size:9px;font-weight:500;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.06em">Marketing Clicks</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <div style="width:10px;height:10px;border-radius:2px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15)"></div>
            <span style="font-size:9px;font-weight:500;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:0.06em">Organic / Direct</span>
          </div>
        </div>`;
    }
    return '';
  }

  let btnsHtml = '';
  metrics.forEach((m, i) => {
    btnsHtml += `<button class="metric-btn${i === 0 ? ' active' : ''}" data-metric="${m.key}">${m.label}</button>`;
  });

  document.getElementById('dailyCard').innerHTML = `
    <div class="card-header">
      <div class="card-title"><div class="dot" style="background:#45E85C"></div> DAILY TOTALS</div>
      <div class="metric-switcher">${btnsHtml}</div>
    </div>
    <div class="daily-subtitle" id="dailySubtitle">${metrics[0].label} · Jun 10 – 16</div>
    <div class="daily-chart" id="dailyChartArea">${renderDailyChart(metrics[0].key)}</div>
    <div id="dailyLegend">${getLegend(metrics[0].key)}</div>`;

  document.querySelectorAll('.metric-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.metric-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      const mk = this.dataset.metric;
      const label = metrics.find(m => m.key === mk).label;
      document.getElementById('dailySubtitle').textContent = label + ' · Jun 10 – 16';
      document.getElementById('dailyChartArea').innerHTML = renderDailyChart(mk);
      document.getElementById('dailyLegend').innerHTML = getLegend(mk);
    });
  });
})();

// ===================== CONVERSIONS TABLE =====================
(function() {
  const convs = DATA.conversions;
  const totals = {
    visitors: convs.reduce((s, c) => s + c.visitors, 0),
    signups: convs.reduce((s, c) => s + c.signups, 0),
    traders: convs.reduce((s, c) => s + c.traders, 0)
  };

  let rowsHtml = '';
  convs.forEach(c => {
    rowsHtml += `
      <tr>
        <td><div class="dot" style="background:${c.color}"></div>${c.name}</td>
        <td>${formatNumber(c.visitors)}</td>
        <td>${formatNumber(c.signups)}</td>
        <td>${formatNumber(c.traders)}</td>
      </tr>`;
  });

  document.getElementById('conversionsCard').innerHTML = `
    <div class="card-header">
      <div class="card-title"><div class="dot" style="background:#3B82F6"></div> CONVERSIONS BY SOURCE</div>
    </div>
    <table class="conv-table">
      <thead><tr>
        <th>Channel</th><th>Visitors</th><th>Signups</th><th>Traders</th>
      </tr></thead>
      <tbody>
        ${rowsHtml}
        <tr class="total">
          <td>Total</td>
          <td>${formatNumber(totals.visitors)}</td>
          <td>${formatNumber(totals.signups)}</td>
          <td>${formatNumber(totals.traders)}</td>
        </tr>
      </tbody>
    </table>
    <div class="conv-footnote">Campaign totals from Channel Summary. Weekly source breakdown not available.</div>
    <div class="conv-footnote" style="margin-top:8px;font-style:italic">From Jun 10–16, post-sign-in events (deposit, trade) are unattributed due to losing tracking parameters in the sign-in process.</div>`;
})();

// ===================== DAILY BREAKDOWN =====================
(function() {
  const days = DATA.daily;
  const totals = {
    impressions: days.reduce((s, d) => s + d.impressions, 0),
    clicks: days.reduce((s, d) => s + d.clicks, 0),
    visitors: days.reduce((s, d) => s + d.visitors, 0),
    signups: days.reduce((s, d) => s + d.signups, 0),
    depositors: days.reduce((s, d) => s + d.depositors, 0),
    traders: days.reduce((s, d) => s + d.traders, 0),
    outcomeVol: days.reduce((s, d) => s + d.outcomeVol, 0),
    hlShare: DATA.volume.platformShare
  };

  let rowsHtml = '';
  days.forEach(d => {
    const share = d.hlVol > 0 ? ((d.outcomeVol / d.hlVol) * 100).toFixed(1) : '0.0';
    rowsHtml += `
      <tr>
        <td><span class="breakdown-date-main">${d.date}</span><span class="breakdown-date-day">${d.day}</span></td>
        <td>${formatNumber(d.impressions)}</td>
        <td>${formatNumber(d.clicks)}</td>
        <td>${formatNumber(d.visitors)}</td>
        <td class="green">${formatNumber(d.signups)}</td>
        <td>${formatNumber(d.depositors)}</td>
        <td>${formatNumber(d.traders)}</td>
        <td class="orange">${formatCurrency(d.outcomeVol)}</td>
        <td>${share}%</td>
      </tr>`;
  });

  document.getElementById('breakdownCard').innerHTML = `
    <div class="card-header">
      <div class="card-title"><div class="dot" style="background:#F58220"></div> DAILY BREAKDOWN</div>
    </div>
    <div class="breakdown-subtitle">ACQUISITION FUNNEL & OUTCOME VOLUME BY DAY</div>
    <table class="breakdown-table">
      <thead><tr>
        <th>Date</th><th>Impressions</th><th>Clicks</th><th>Visitors</th>
        <th>Signups</th><th>Depositors</th><th>Traders</th><th>Outcome Vol.</th><th>HL Share</th>
      </tr></thead>
      <tbody>
        ${rowsHtml}
        <tr class="summary-row">
          <td>WEEK 1</td>
          <td>${formatNumber(totals.impressions)}</td>
          <td>${formatNumber(totals.clicks)}</td>
          <td>${formatNumber(totals.visitors)}</td>
          <td class="green">${formatNumber(totals.signups)}</td>
          <td>${formatNumber(totals.depositors)}</td>
          <td>${formatNumber(totals.traders)}</td>
          <td class="orange">${formatCurrencyFull(totals.outcomeVol)}</td>
          <td>${formatPercent(totals.hlShare)}</td>
        </tr>
      </tbody>
    </table>
    <div class="breakdown-footer">SOURCE · OUTCOME WORLD CUP CAMPAIGN TRACKER · CONVERSIONS VIA POSTHOG · VOLUME VS HYPERLIQUID HIP-4</div>`;
})();
</script>
